<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMAROSE GPT</title>
    <!-- Подключаем иконки Google Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131313; /* Глубокий черный фон */
            --surface-color: #1c1c1c; /* Цвет карточек */
            --text-primary: #ffffff;
            --text-secondary: #9e9e9e;
            --accent-color: #4caf50; /* Фирменный зеленый акцент как на видео */
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-size: 16px;
        }

        /* Шапка сайта (Header) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Основная область (выбор режима) */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .conversion-panel {
            width: 100%;
            max-width: 600px;
            background: var(--surface-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
        }

        .status-badge {
            background-color: rgba(76, 175, 80, 0.1);
            color: var(--accent-color);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .option-card {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-card:hover {
            border-color: var(--accent-color);
        }

        .option-card.active {
            border-color: var(--accent-color);
            background-color: rgba(76, 175, 80, 0.05);
        }

        .option-label {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .option-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .radio-icon {
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-card.active .radio-icon::after {
            content: '';
            width: 10px;
            height: 10px;
            background-color: var(--accent-color);
            border-radius: 50%;
        }

        /* Секция настроек (как на видео) */
        .settings-section {
            width: 100%;
            max-width: 600px;
            background: var(--surface-color);
            border-radius: 16px;
            overflow: hidden;
        }

        .settings-item {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .settings-item:hover {
            background-color: rgba(255,255,255,0.03);
        }

        .material-icons-outlined {
            color: var(--text-secondary);
            font-size: 24px;
        }

        .settings-text {
            flex: 1;
        }

        .settings-label {
            font-size: 16px;
            font-weight: 500;
        }

        .settings-value {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .chevron {
            color: var(--text-secondary);
            font-size: 18px;
        }

    </style>
</head>
<body>

    <!-- Шапка (Header) -->
    <header>
        <button class="header-btn" onclick="alert('Назад')">
            <span class="material-icons-outlined">arrow_back</span>
        </button>
        <div class="header-title">Внешний вид</div>
        <button class="header-btn" onclick="alert('Поиск')">
            <span class="material-icons-outlined">search</span>
        </button>
    </header>

    <!-- Основной контент (карточки выбора) -->
    <div class="main-content">
        
        <!-- Панель переключения -->
        <div class="conversion-panel">
            <div class="panel-header">
                <div class="panel-title">Режим конвертации</div>
                <span class="status-badge">Премиум</span>
            </div>

            <!-- Карточка 1 (Активная) -->
            <div class="option-card active" onclick="selectOption(this)">
                <div>
                    <div class="option-label">AMAROSE Smart</div>
                    <div class="option-desc">Оптимальный баланс скорости и качества</div>
                </div>
                <div class="radio-icon"></div>
            </div>

            <!-- Карточка 2 (Неактивная) -->
            <div class="option-card" onclick="selectOption(this)">
                <div>
                    <div class="option-label">AMAROSE Max</div>
                    <div class="option-desc">Максимальная точность, медленнее</div>
                </div>
                <div class="radio-icon"></div>
            </div>
        </div>

        <!-- Список настроек (как в меню) -->
        <div class="settings-section">
            <div class="settings-item">
                <span class="material-icons-outlined">tune</span>
                <div class="settings-text">
                    <div class="settings-label">Акцентный цвет</div>
                    <div class="settings-value">Зеленый</div>
                </div>
                <span class="material-icons-outlined chevron">chevron_right</span>
            </div>

            <div class="settings-item">
                <span class="material-icons-outlined">chat_bubble_outline</span>
                <div class="settings-text">
                    <div class="settings-label">Общее</div>
                </div>
                <span class="material-icons-outlined chevron">chevron_right</span>
            </div>

            <div class="settings-item">
                <span class="material-icons-outlined">mic</span>
                <div class="settings-text">
                    <div class="settings-label">Голос</div>
                </div>
                <span class="material-icons-outlined chevron">chevron_right</span>
            </div>
        </div>
    </div>

    <script>
        function selectOption(card) {
            // Убираем класс active у всех карточек
            const cards = document.querySelectorAll('.option-card');
            cards.forEach(c => c.classList.remove('active'));
            // Добавляем active к нажатой карточке
            card.classList.add('active');
        }
    </script>

</body>
</html>
